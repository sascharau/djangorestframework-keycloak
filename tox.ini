[tox]
envlist=
    py{310,311,312,313}-dj42-drf{314,315,316}-pyjwt2-tests
    py{310,311,312,313}-dj52-drf{315,316}-pyjwt2-tests
    py{312,313}-dj60-drf316-pyjwt2-tests

[gh-actions]
python=
    3.10: py310
    3.11: py311
    3.12: py312
    3.13: py313

[gh-actions:env]
DJANGO=
    4.2: dj42
    5.2: dj52
    6.0: dj60
DRF=
    3.14: drf314
    3.15: drf315
    3.16: drf316

[testenv]
commands = pytest {posargs:tests} --cov-append --cov-report=xml --cov=drf_keycloak
extras=
    test
setenv=
    PYTHONDONTWRITEBYTECODE=1
deps=
    dj42: Django>=4.2,<4.3
    dj52: Django>=5.2,<5.3
    dj60: Django>=6.0,<6.1
    drf314: djangorestframework>=3.14,<3.15
    drf315: djangorestframework>=3.15,<3.16
    drf316: djangorestframework>=3.16,<3.17
    pyjwt2: pyjwt>=2,<3
    cryptography>=3.3.1
    requests>=2.26.0
allowlist_externals=make
