services:
  keycloak:
    image: quay.io/keycloak/keycloak:26.6.1
    environment:
      # Keycloak 26 renamed the bootstrap admin vars (KEYCLOAK_ADMIN[_PASSWORD]
      # are deprecated). These create the initial admin/admin account.
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      # In-memory H2: a throwaway test DB that starts clean on every boot.
      # (A persisted volume breaks across Keycloak major upgrades.)
      KC_DB: dev-mem
      KC_HEALTH_ENABLED: "true"
    ports:
      - "8080:8080"
      - "9000:9000"   # management port (health: /health/ready)
    command:
      - start-dev

  test-backend:
    build:
      context: ..
      dockerfile: test_project/Dockerfile
    environment:
      - KEYCLOAK_SERVER_URL=http://keycloak:8080/realms/test-realm
      - KEYCLOAK_ISSUER=http://localhost:8080/realms/test-realm
      - PYTHONPATH=/app
    depends_on:
      - keycloak
    ports:
      - "8000:8000"
    volumes:
      - .:/app/test_project
      - ..:/app
    working_dir: /app
    command: >
      sh -c "cd test_project &&
             python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
